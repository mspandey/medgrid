<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediGrid — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #D80032;
            --primary-dark: #b9002d;
            --bg: #f8f9fa;
            --surface: #ffffff;
            --text: #2B2D42;
            --text-light: #8D99AE;
            --border: #e2e8f0;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: var(--surface);
            width: 100%;
            max-width: 900px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            min-height: 550px;
        }

        .brand-side {
            width: 45%;
            background: var(--primary);
            color: white;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .brand-side::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 60%);
        }

        .brand-logo {
            font-size: 2rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10;
        }

        .brand-bg-icon {
            position: absolute;
            bottom: -50px;
            right: -50px;
            font-size: 15rem;
            opacity: 0.1;
            transform: rotate(-20deg);
        }

        .form-side {
            width: 55%;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 10px;
            color: var(--text);
        }

        p.sub {
            color: var(--text-light);
            margin-bottom: 30px;
        }

        .role-switch {
            display: flex;
            background: #f1f3f5;
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .role-btn {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            transition: 0.2s;
        }

        .role-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
        }

        .form-input {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.2s;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: var(--text-light);
            font-size: 0.85rem;
            font-weight: 600;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: var(--border);
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <!-- LEFT BRANDING -->
        <div class="brand-side">
            <div class="brand-logo">
                <div>M</div> MediGrid
            </div>
            <div style="z-index:10; font-weight:500; line-height:1.6; opacity:0.9;">
                Connecting hospitals, ambulances, and patients in real-time to save lives.
            </div>
            <div class="brand-bg-icon">🏥</div>
        </div>

        <!-- RIGHT FORM -->
        <div class="form-side">
            <div class="role-switch">
                <button class="role-btn active" onclick="setRole('user')">Patient / Public</button>
                <button class="role-btn" onclick="setRole('hospital')">Hospital Staff</button>
            </div>

            <!-- USER FORM -->
            <div id="form-user">
                <h2>Welcome Back</h2>
                <p class="sub">Log in to view hospital availability and donate blood.</p>

                <!-- Users can actually just browse without login usually, but per request we simulate login -->
                <form id="u-login" onsubmit="handleUserLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-input" placeholder="name@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn">Log In</button>
                </form>

                <div class="divider">OR</div>
                <button class="btn" style="background:white; color:var(--text); border:2px solid var(--border);"
                    onclick="window.location.href='user_dashboard.html'">Continue as Guest</button>

                <div class="footer-link">
                    New here? <a href="#">Create an Account</a>
                </div>
            </div>

            <!-- HOSPITAL FORM -->
            <div id="form-hospital" class="hidden">
                <h2>Hospital Portal</h2>
                <p class="sub">Access your facility dashboard to manage resources.</p>

                <form id="h-login" onsubmit="handleHospitalLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Hospital Email</label>
                        <input type="email" id="h-email" class="form-input" placeholder="admin@hospital.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="h-pass" class="form-input" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn">Access Dashboard</button>
                </form>

                <div class="footer-link">
                    Not registered? <a href="register_hospital.html">Register Facility</a>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { auth, signInWithEmailAndPassword } from './firebase_config.js';

        window.setRole = (role) => {
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            if (role === 'user') {
                document.getElementById('form-user').classList.remove('hidden');
                document.getElementById('form-hospital').classList.add('hidden');
            } else {
                document.getElementById('form-user').classList.add('hidden');
                document.getElementById('form-hospital').classList.remove('hidden');
            }
        };

        window.handleUserLogin = (e) => {
            e.preventDefault();
            // For now, users can just go to dashboard. auth logic can be added later.
            window.location.href = 'user_dashboard.html';
        };

        window.handleHospitalLogin = async (e) => {
            e.preventDefault();
            const email = document.getElementById('h-email').value;
            const pass = document.getElementById('h-pass').value;

            try {
                // If config is dummy, this will fail. For demo we might want a bypass.
                if (email === 'demo@medgrid.com' && pass === 'demo') {
                    localStorage.setItem('medgrid_role', 'hospital');
                    window.location.href = 'staff_portal.html';
                    return;
                }

                await signInWithEmailAndPassword(auth, email, pass);
                localStorage.setItem('medgrid_role', 'hospital');
                window.location.href = 'staff_portal.html';
            } catch (error) {
                alert("Login User/Pass incorrect (Check console for Firebase errors if keys are missing)\n" + error.message);
                // Fallback for demo if users haven't set keys
                if (confirm("Firebase not configured or invalid credentials. Enter Demo Mode?")) {
                    window.location.href = 'staff_portal.html';
                }
            }
        };
    </script>

</body>

</html>
